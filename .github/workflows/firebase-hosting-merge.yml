name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and build
        run: npm ci && npm run build
        working-directory: client
        env:
          VITE_API_URL: https://team-task-manager-production-8407.up.railway.app/api
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEAMTASKMANAGER_141D5 }}
          channelId: live
          projectId: teamtaskmanager-141d5
          entryPoint: client